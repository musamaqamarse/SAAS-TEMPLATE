name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6.0.4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages (core + cli)
        run: pnpm -r --filter "./packages/*" run build

      - name: Typecheck packages
        run: pnpm -r --filter "./packages/*" run lint

      - name: Validate templates
        run: pnpm validate:templates

      - name: Build apps (web/docs/marketing — also typechecks)
        run: pnpm -r --filter "./apps/*" run build

      - name: Tests (unit; Playwright runs in e2e workflow)
        run: pnpm -r --filter "!@create-saas/e2e" run test:run

  release:
    name: release
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6.0.4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
