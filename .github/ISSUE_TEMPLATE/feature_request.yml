name: Feature request
description: Suggest a new template, addon, or capability.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the friction or repetitive work you'd like create-saas to remove.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should create-saas do? Include rough CLI flag names or template paths if you have them in mind.
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New template / stack
        - New addon (Stripe, email, etc.)
        - Lifecycle command (update, add, remove)
        - Web UI
        - Plugin / extensibility
        - Docs
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools or approaches you've tried, and why they didn't fit.
